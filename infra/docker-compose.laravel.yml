services:
  app:
    build:
      context: ../services/backend-laravel
      dockerfile: docker/php.Dockerfile
    container_name: elitesync_laravel_app
    volumes:
      - ../services/backend-laravel:/var/www/html
    working_dir: /var/www/html
    command: sh -c "composer install --no-interaction --prefer-dist && php-fpm"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.26.1
    container_name: elitesync_laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ../services/backend-laravel:/var/www/html
      - ../services/backend-laravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0.36
    container_name: elitesync_mysql
    environment:
      MYSQL_DATABASE: elitesync
      MYSQL_USER: elitesync
      MYSQL_PASSWORD: elitesync123
      MYSQL_ROOT_PASSWORD: root123456
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2.4
    container_name: elitesync_redis
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: elitesync_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123456
    depends_on:
      - mysql

volumes:
  mysql_data:
