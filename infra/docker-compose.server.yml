services:
  app:
    build:
      context: ../services/backend-laravel
      dockerfile: docker/php.Dockerfile
    container_name: elitesync_app
    working_dir: /var/www/html
    volumes:
      - ../services/backend-laravel:/var/www/html
    command: sh -c "composer install --no-interaction --prefer-dist && php-fpm"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: unless-stopped
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.26.1
    container_name: elitesync_nginx
    ports:
      - "8080:80"
    volumes:
      - ../services/backend-laravel:/var/www/html
      - ../services/backend-laravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - app

  ws:
    build:
      context: ../services/backend-laravel
      dockerfile: docker/php.Dockerfile
    container_name: elitesync_ws
    working_dir: /var/www/html
    volumes:
      - ../services/backend-laravel:/var/www/html
    command: sh -c "composer install --no-interaction --prefer-dist && php artisan chat:ws --host=0.0.0.0 --port=8081"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - app
      - redis

  mysql:
    image: mysql:8.0.36
    container_name: elitesync_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: elitesync
      MYSQL_USER: elitesync
      MYSQL_PASSWORD: elitesync123
      MYSQL_ROOT_PASSWORD: root123456
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7.2.4
    container_name: elitesync_redis
    restart: unless-stopped

volumes:
  mysql_data:
