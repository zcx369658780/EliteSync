name: ci-baseline

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: Backend Laravel Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend-laravel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.5 and Composer
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.5 php8.5-cli php8.5-mbstring php8.5-sqlite3 php8.5-bcmath php8.5-intl unzip curl
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          sudo php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          php -v
          composer --version

      - name: Validate Composer Files
        run: composer validate --no-check-publish --strict

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run Backend Tests
        run: php artisan test

  android-build:
    name: Android Assemble Debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Android SDK Environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/bin" >> $GITHUB_PATH

      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
