name: ci-baseline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-gate-quick:
    name: Release Gate (Quick)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Quick Release Gate
        shell: pwsh
        run: |
          ./scripts/release_gate_alpha.ps1 -QuickUpdateOnly

      - name: Upload Gate Logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-gate-logs
          path: |
            docs/devlogs/RELEASE_GATE_LOG.md
            docs/devlogs/SMOKE_LOG.md

  backend-tests:
    name: Backend Laravel Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend-laravel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, sqlite3, pdo_mysql, bcmath, intl, xml
          tools: composer:v2
          coverage: none

      - name: Show PHP / Composer Version
        run: |
          php -v
          composer --version

      - name: Validate Composer Files
        run: composer validate --no-check-publish --strict

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run Backend Tests
        run: php artisan test

  android-build:
    name: Android Assemble Debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Build Flutter module AAR repo
        run: |
          cd ../flutter_elitesync_module
          flutter pub get
          flutter build aar --no-tree-shake-icons
          ls -la build/host/outputs/repo/com/elitesync/flutter_elitesync_module/flutter_release/1.0 || true

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Android SDK Environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/bin" >> $GITHUB_PATH

      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
